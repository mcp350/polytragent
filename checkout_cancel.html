<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancelled — Polytragent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#e8e8e8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#111;border:1px solid #1f1f1f;border-radius:16px;max-width:480px;width:100%;padding:48px 40px;text-align:center}
  .icon{font-size:48px;margin-bottom:24px}
  h1{font-size:28px;font-weight:700;margin-bottom:12px;color:#fff}
  p{color:#888;font-size:15px;line-height:1.6;margin-bottom:8px}
  .btn{display:inline-block;background:#00ff88;color:#000;font-weight:700;font-size:15px;padding:14px 32px;border-radius:8px;text-decoration:none;margin-top:24px;margin-right:12px}
  .btn:hover{background:#00e07a}
  .btn-ghost{display:inline-block;color:#888;font-size:14px;padding:14px 20px;text-decoration:none;margin-top:24px}
  .btn-ghost:hover{color:#ccc}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🤔</div>
  <h1>Changed your mind?</h1>
  <p>No worries — your checkout was cancelled and nothing was charged.</p>
  <p style="margin-top:16px;color:#ccc;">The free tier is always available for up to 20 wallets. Come back whenever you're ready to go Degen.</p>
  <br>
  <a href="/#pricing" class="btn">See pricing again →</a>
  <a href="/" class="btn-ghost">Back to home</a>
</div>
</body>
</html>
